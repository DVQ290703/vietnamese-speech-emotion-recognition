model_name: openai/whisper-small
dataset_name: NhutP/VietSpeech

language: Vietnamese
task: transcribe

sample_rate: 16000
max_duration_seconds: 30

train_samples: 5000
eval_samples: 500

output_dir: models/checkpoints/whisper
best_model_dir: models/best/whisper

learning_rate: 1e-5
warmup_steps: 100
num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
fp16: true

logging_steps: 25
eval_steps: 250
save_steps: 250